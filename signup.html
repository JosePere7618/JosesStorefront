<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign Up</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div>
    <img src="logo.png" alt="Joses Store Logo" width="100" style="border:1px solid #2c3e50;">
    <h1>Joses Store</h1>
  </div>

  <nav>
    <a href="storefront.html">Home</a>
    <a href="signup.html">Sign Up</a>
  </nav>
</header>

<main class="container py-4">
  <h2 class="mb-3">User Sign Up</h2>

  <div class="card p-3" style="max-width: 500px;">
    <form>
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="joe@test.com" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" required>
      </div>

      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
  </div>
</main>

<footer>
  <a href="#">Terms of Use</a>
  <a href="#">Privacy Policy</a>
  <a href="#">Copyright</a>
</footer>

</body>
</html>
